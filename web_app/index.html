<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChessRCCN | AI Dashboard</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <!-- Chessboard.js CSS -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <!-- Main CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Libraries -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.2/chess.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar / Navigation -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon"></div>
                <h1>Chess<span>RCCN</span></h1>
            </div>
            <nav>
                <ul>
                    <li class="active"><a href="#"><i class="icon-play"></i> Play</a></li>
                    <li><a href="#"><i class="icon-stats"></i> Analysis</a></li>
                    <li><a href="#"><i class="icon-settings"></i> Settings</a></li>
                </ul>
            </nav>
            <div class="model-status">
                <div class="status-indicator online"></div>
                <div class="status-text">
                    <p class="status-label">Model Status</p>
                    <p class="status-value" id="model-status-text">Connecting...</p>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header>
                <div class="header-info">
                    <h2>Match Arena</h2>
                    <p>Testing RCCN Checkpoint v1.7</p>
                </div>
                <div class="header-actions">
                    <button id="reset-btn" class="btn secondary">New Game</button>
                    <button id="flip-btn" class="btn secondary">Flip Board</button>
                </div>
            </header>

            <div class="game-area">
                <div class="board-card">
                    <div id="myBoard" class="chess-board"></div>
                    <div class="board-info">
                        <div class="player black-player">
                            <div class="avatar bot-avatar"></div>
                            <div class="info">
                                <span class="name">RCCN Bot</span>
                                <span class="elo">~2100 Est.</span>
                            </div>
                            <div class="clock" id="bot-clock">00:00</div>
                        </div>
                        <div class="player white-player">
                            <div class="avatar human-avatar"></div>
                            <div class="info">
                                <span class="name">Guest Player</span>
                                <span class="elo">1500?</span>
                            </div>
                            <div class="clock" id="human-clock">00:00</div>
                        </div>
                    </div>
                </div>

                <div class="analysis-panel">
                    <div class="panel-card stats-card">
                        <h3>Model Evaluation</h3>
                        <div class="chart-container">
                            <canvas id="evalChart"></canvas>
                        </div>
                    </div>

                    <div class="panel-card moves-card">
                        <h3>Top Move Suggestions</h3>
                        <div id="top-moves-list" class="moves-list">
                            <div class="move-item empty">Play a move to see analysis</div>
                        </div>
                    </div>

                    <div class="panel-card history-card">
                        <h3>Move History</h3>
                        <div id="pgn-display" class="pgn-container">
                            <div class="pgn-content">1. e4 e5 ...</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Promotion Popup -->
    <div id="promotion-overlay" class="overlay hidden">
        <div class="popup">
            <h3>Pawn Promotion</h3>
            <div class="promotion-pieces">
                <div class="piece" data-piece="q"><img src="https://chessboardjs.com/img/chesspieces/wikipedia/wQ.png" alt="Queen"></div>
                <div class="piece" data-piece="r"><img src="https://chessboardjs.com/img/chesspieces/wikipedia/wR.png" alt="Rook"></div>
                <div class="piece" data-piece="b"><img src="https://chessboardjs.com/img/chesspieces/wikipedia/wB.png" alt="Bishop"></div>
                <div class="piece" data-piece="n"><img src="https://chessboardjs.com/img/chesspieces/wikipedia/wN.png" alt="Knight"></div>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
